# forge-calc reverse-proxy — NEW, SEPARATE nginx site.
# Install as /etc/nginx/sites-available/forge-calc and symlink into
# sites-enabled. DO NOT edit the existing `chirpstack` site. nginx routes by
# Host/SNI, so this 443 server coexists with cs.matsumoto-works.jp on the same
# IP. Hosted as a subdomain of the existing (Cloudflare) zone — swap server_name
# to a dedicated domain (e.g. forge-calc.jp) later if it becomes a standalone
# product; nginx can serve both names at once.

server {
    listen 443 ssl;
    server_name fem.matsumoto-works.jp;

    ssl_certificate     /etc/letsencrypt/live/fem.matsumoto-works.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fem.matsumoto-works.jp/privkey.pem;

    client_max_body_size 20m;          # room for DXF uploads (future)

    location / {
        proxy_pass http://127.0.0.1:8000;   # forge-calc container, localhost only
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;            # solves are async; calls are short
    }
}

server {
    listen 80;
    server_name fem.matsumoto-works.jp;
    return 301 https://$host$request_uri;
}
